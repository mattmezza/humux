{# Admin tab partial #}
<div class="space-y-6">
  <div class="card" x-data="{ current: '', next: '', confirm: '', result: '', ok: false }">
    <div class="flex items-center gap-3 mb-1">
      <h2 class="text-base">Change password</h2>
    </div>
    <p class="text-muted text-xs mb-4">Update the admin password used to log in to this dashboard.</p>

    <div class="space-y-3" style="max-width: 360px;">
      <div>
        <label class="label" for="admin-current-pw">Current password</label>
        <input type="password" class="input-sm" autocomplete="current-password"
               x-model="current" placeholder="Current password" id="admin-current-pw">
      </div>
      <div>
        <label class="label" for="admin-new-pw">New password</label>
        <input type="password" class="input-sm" autocomplete="new-password"
               x-model="next" placeholder="New password" id="admin-new-pw">
      </div>
      <div>
        <label class="label" for="admin-confirm-pw">Confirm new password</label>
        <input type="password" class="input-sm" autocomplete="new-password"
               x-model="confirm" placeholder="Confirm" id="admin-confirm-pw">
      </div>
    </div>

    <div class="flex items-center gap-2 mt-4">
      <button class="btn-primary btn-sm" type="button"
              @click="
                if (!current || !next || !confirm) { ok = false; result = 'All fields are required.'; return; }
                if (next !== confirm) { ok = false; result = 'New passwords do not match.'; return; }
                withLoading($el, () =>
                  fetch('/admin/password', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'Authorization': 'Bearer ' + (localStorage.getItem('admin_api_key') || '')
                    },
                    body: JSON.stringify({current_password: current, new_password: next})
                  })
                  .then(r => r.json())
                  .then(d => {
                    if (d.ok) {
                      ok = true; result = 'Password updated.';
                      current = ''; next = ''; confirm = '';
                      localStorage.setItem('admin_api_key', d.token || '');
                    } else {
                      ok = false; result = d.error || 'Update failed.';
                    }
                  })
                  .catch(e => { ok = false; result = e.message; })
                )
              ">
        Update password
      </button>
    </div>
    <template x-if="result">
      <div :class="ok ? 'alert-success' : 'alert-error'" class="mt-3" x-text="result"></div>
    </template>
  </div>
</div>
