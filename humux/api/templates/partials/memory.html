{# Memory tab wrapper: Settings | Long-term | Short-term sub-tabs.
   Each sub-tab lazy-loads its own partial via htmx. The active sub-tab
   is mirrored in the URL as ?memsub= for copy-pasteable links. #}
{% import 'partials/_macros.html' as m %}
<div x-data="memorySubtab()" x-init="init()">
  <div class="flex border-b border-border mb-4 overflow-x-auto">
    <button type="button" class="tab-link" :class="sub === 'settings' && 'tab-link-active'" @click="select('settings')">Settings</button>
    <button type="button" class="tab-link" :class="sub === 'long-term' && 'tab-link-active'" @click="select('long-term')">Long-term</button>
    <button type="button" class="tab-link" :class="sub === 'short-term' && 'tab-link-active'" @click="select('short-term')">Short-term</button>
  </div>
  <div id="memory-sub">
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
  </div>
</div>
