services:
  agent:
    build: .
    container_name: humux
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # data/ also holds skills installed from git repos (data/skills/, #65).
      # Installs always target this volume — the skills/ seed dir is read-only
      # here and baked into the image in setups that don't mount it at all —
      # so installed skills survive both restarts and image updates.
      - ./data:/app/data
      - ./config.yml:/app/config.yml:ro
      - ./character.md:/app/character.md:ro
      - ./skills:/app/skills:ro
    env_file: .env

  # Optional headless-Chromium sidecar (keeps the main image lean). Start with:
  #   docker compose --profile browser up
  # Then set tools.browser.cdp_url to ws://browser:3000 in the admin UI.
  browser:
    image: browserless/chrome:latest
    container_name: humux-browser
    restart: unless-stopped
    profiles: ["browser"]
    environment:
      - MAX_CONCURRENT_SESSIONS=2

  # Embedding sidecar — the DEFAULT semantic-memory backend (keeps fastembed +
  # onnxruntime out of the main image; the config default already points at
  # http://embeddings:7997/v1). To run on-device instead: build the main image
  # with INSTALL_FASTEMBED=true and set memory.embedding.provider to "local".
  embeddings:
    image: michaelf34/infinity:latest
    command: v2 --model-id intfloat/multilingual-e5-small --port 7997
    container_name: humux-embeddings
    restart: unless-stopped
    profiles: ["embeddings"]

  # Optional Whisper STT sidecar — OpenAI-compatible transcription endpoint.
  # Start with:  docker compose --profile whisper up
  # Then set voice.stt_api_base_url to http://whisper:8000/v1 in the admin UI.
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: humux-whisper
    restart: unless-stopped
    profiles: ["whisper"]

  # Optional Kokoro TTS sidecar — OpenAI-compatible TTS on port 8880.
  # Start with:  docker compose --profile kokoro up
  # Then set voice.tts_api_base_url to http://kokoro:8880/v1 in the admin UI.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: humux-kokoro
    restart: unless-stopped
    profiles: ["kokoro"]
